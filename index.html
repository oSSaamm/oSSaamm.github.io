<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Skillbuilder's Help</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background: #0f0f0f;
        color: #eaeaea;
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
    }
    #container { display: flex; flex-direction: column; min-height: 100vh; }
    #tabs {
        width: 100%;
        background: #151515;
        border-bottom: 2px solid #222;
        overflow-x: auto;
        padding: 8px 0;
    }
    .tab {
        display: inline-block;
        padding: 14px 18px;
        cursor: pointer;
        color: #ccc;
        transition: all .2s;
    }
    .tab:hover { background: #1f1f1f; color: #fff; }
    .tab.active {
        background: #272727;
        color: #ffd400;
        border-bottom: 3px solid #ffd400;
    }

    #content-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #search-bar { padding: 12px 15px; background: #151515; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10; }
    #search-input {
        width: 100%; padding: 12px 16px; font-size: 16px; background: #1f1f1f; color: #eaeaea;
        border: 1px solid #444; border-radius: 8px; outline: none;
    }
    #search-input:focus { border-color: #ffd400; box-shadow: 0 0 0 3px rgba(255,212,0,0.2); }

    #content {
        flex: 1; padding: 15px; overflow-y: auto; line-height: 1.6;
        font-family: 'Courier New', monospace; font-size: 14.5px;
    }

    .highlight { background-color: #ffd400; color: #000; padding: 2px 4px; border-radius: 4px; }
    .bold { font-weight: bold; color: #f5dab3; }

    /* Presets */
    #presets-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
    }
    .preset-btn {
        background: #1f1f1f;
        color: #eaeaea;
        border: 1px solid #444;
        padding: 12px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
        min-width: 180px;
    }
    .preset-btn:hover {
        background: #2a2a2a;
        border-color: #ffd400;
        transform: translateY(-2px);
    }
    .preset-btn:active {
        background: #ffd400;
        color: #111;
    }

    #message-me, #video-extractor { padding: 20px; }
</style>
</head>
<body>
<div id="container">
    <div id="tabs"></div>
    <div id="content-area">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Example: Emotes">
        </div>
        <div id="content">Loading 😭🥀/if you get this message for too long then it means im updating the site/trying to fix something</div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="./perfection.js"></script>
<script src="./yuji.js"></script>
<script type="module">
import { data } from "./content.js"
alert(
`Current Version: 1.0.5
Check the update log to know more`
)

// ==================== FUNCS ====================
const tabsEl = document.getElementById("tabs");
const contentEl = document.getElementById("content");
const searchInput = document.getElementById("search-input");

let highlights = [];
let currentHighlightIndex = -1;

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function convertBold(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<span class="bold">$1</span>');
}

function render(text) {
    const safe = escapeHtml(text);
    const withBold = convertBold(safe);
    contentEl.innerHTML = `<pre>${withBold}</pre>`;
}

// ==================== SEARCH ====================
function performSearch(term) {
    if (!contentEl.dataset.raw) return;

    const raw = contentEl.dataset.raw;

    highlights = [];
    currentHighlightIndex = -1;

    if (!term || !term.trim()) {
        render(raw);
        return;
    }

    const safe = escapeHtml(raw);

    const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escapedTerm})`, "gi");

    const highlighted = convertBold(
    safe.replace(regex, `<span class="highlight">$1</span>`)
);

    contentEl.innerHTML = `<pre>${highlighted}</pre>`;

    highlights = Array.from(contentEl.querySelectorAll(".highlight"));
    currentHighlightIndex = highlights.length > 0 ? 0 : -1;

    scrollToHighlight();
}
function scrollToHighlight() {
    if (highlights.length === 0 || currentHighlightIndex < 0) return;

    highlights[currentHighlightIndex].scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

// ==================== CREATE TAB ====================
function createTab(key, isVideoExtractor = false, isMessageMe = false, isPresets = false) {
    const div = document.createElement("div");
    div.className = "tab";
    div.textContent = key;
    div.dataset.key = key;

    div.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        div.classList.add("active");

        if (isPresets) {
            showPresets();
        } else if (isMessageMe) {
            showMessageMe();
        } else if (isVideoExtractor) {
            showVideoExtractor();
        } else {
            let contentText = data[key] || "Content not found";

            contentEl.dataset.raw = contentText;

            render(contentText);

            searchInput.value = "";
            searchInput.parentElement.style.display = "block";

            highlights = [];
            currentHighlightIndex = -1;
        }
    };

    tabsEl.appendChild(div);
}

// ==================== PRESETS ====================
function showPresets() {
    searchInput.parentElement.style.display = "none";
    contentEl.innerHTML = `
        <h2 style="color:#ffd400; text-align:center; margin-bottom:25px;">Presets</h2>
        <div id="presets-container" style="display:flex; flex-wrap:wrap; gap:12px; padding:10px;"></div>
    `;

    const container = document.getElementById("presets-container");
    
     const presets = [
        { name: "Yuji OLD", text: `${YujiPreset}` },
       { name: "Perfection OLD", text: `${MahitoPreset}`},
    ];

    presets.forEach(p => {
        const btn = document.createElement("button");
        btn.className = "preset-btn";
        btn.textContent = p.name;
        btn.onclick = () => {
            navigator.clipboard.writeText(p.text).then(() => {
                const original = btn.textContent;
                btn.textContent = "✓ Copied!";
                btn.style.background = "#0a0";
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = "";
                }, 1500);
            });
        };
        container.appendChild(btn);
    });
}

// ==================== MESSAGE ME (Estilizado) ====================
function showMessageMe() {
    searchInput.parentElement.style.display = "none";
    
    contentEl.innerHTML = `
    <div style="max-width: 620px; margin: 40px auto; padding: 35px; background: #1a1a1a; border-radius: 16px; border: 1px solid #333;">
        <h2 style="color: #ffd400; text-align: center; margin-bottom: 30px; font-size: 28px;">💬 Message Me</h2>
        
        <input type="text" id="discordUsername" placeholder="Your Discord username (ex: osam#1234)" 
               style="width: 100%; padding: 16px; margin-bottom: 16px; background: #222; color: #fff; border: 1px solid #555; border-radius: 10px; font-size: 16px;">
        
        <textarea id="messageText" placeholder="Write your message, suggestion, bug report or anything you want..." 
                  style="width: 100%; min-height: 220px; padding: 16px; background: #222; color: #fff; border: 1px solid #555; border-radius: 10px; font-size: 16px; resize: vertical;"></textarea>
        
        <button id="sendMessageBtn" 
                style="width: 100%; padding: 18px; background: #ffd400; color: #111; border: none; border-radius: 10px; font-weight: bold; font-size: 17px; cursor: pointer; margin-top: 10px;">
            Send Message
        </button>
        
        <div id="status" style="margin-top: 15px; text-align: center; font-size: 15px; min-height: 24px;"></div>
    </div>`;

    const usernameInput = document.getElementById('discordUsername');
    const messageInput = document.getElementById('messageText');
    const sendBtn = document.getElementById('sendMessageBtn');
    const statusEl = document.getElementById('status');

    sendBtn.onclick = async () => {
        const username = usernameInput.value.trim();
        const message = messageInput.value.trim();
        if (!username) {
            statusEl.style.color = '#ff6666';
            statusEl.textContent = "❌ Please enter your Discord username so i can warn you i did it";
            return;
        }
        if (!message) {
            statusEl.style.color = '#ff6666';
            statusEl.textContent = "❌ Please write a message";
            return;
        }
        sendBtn.disabled = true;
        sendBtn.textContent = "Sending...";
        statusEl.style.color = '#ffd400';
        statusEl.textContent = "Sending message...";

        try {
            const payload = { content: `**New message from ${username}**\n\n${message}` };
            const res = await fetch("https://discord.com/api/webhooks/1495427397582061739/xPxHztH1_tIkTBQfzVgEqnjksXotZKFzXCDdBlaWzsxAZhtUOoMgnfVw5ozC7U6Zi9JS", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                statusEl.style.color = '#00ff88';
                statusEl.textContent = "✅ Message sent successfully!";
                messageInput.value = "";
            } else {
                statusEl.style.color = '#ff6666';
                statusEl.textContent = "❌ Failed to send. Try again.";
            }
        } catch (err) {
            statusEl.style.color = '#ff6666';
            statusEl.textContent = "❌ Connection error.";
        }

        sendBtn.disabled = false;
        sendBtn.textContent = "Send Message";
    };
}

// ==================== VIDEO EXTRACTOR ====================
function showVideoExtractor() {
    searchInput.parentElement.style.display = "none";
    
    contentEl.innerHTML = `
    <div style="max-width: 740px; margin: 30px auto; padding: 35px; background: #1a1a1a; border-radius: 16px; border: 1px solid #333;">
        <h2 style="color: #ffd400; text-align: center; margin-bottom: 10px;">Video Frame Extractor</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Extract all frames from a video at 24 fps (PNG + ZIP)</p>
        
        <input type="file" id="videoInput" accept="video/*" 
               style="width: 100%; padding: 14px; background: #222; color: #ddd; border: 2px dashed #555; border-radius: 12px; cursor: pointer; margin-bottom: 25px;">
        
        <video id="preview" controls muted 
               style="width: 100%; max-height: 440px; background: #000; border-radius: 12px; margin-bottom: 25px; display: none;"></video>
        
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button id="startBtn" 
                    style="flex: 1; padding: 16px; background: #ffd400; color: #111; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;">
                ▶️ Start Extraction (24 fps)
            </button>
            
            <button id="downloadBtn" disabled
                    style="flex: 1; padding: 16px; background: #ffd400; color: #111; border: none; border-radius: 10px; font-weight: bold; font-size: 16px;">
                ⬇️ Download ZIP
            </button>
        </div>
        
        <progress id="progress" value="0" max="100" 
                  style="width: 100%; height: 14px; margin: 25px 0; border-radius: 999px; background: #333;"></progress>
        
        <div id="status" style="text-align: center; font-size: 15px; color: #aaa; min-height: 28px;">
            Select a video to begin
        </div>
    </div>`;

    // Lógica do Video Extractor (mantida)
    const videoInput = document.getElementById('videoInput');
    const preview = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const progress = document.getElementById('progress');
    const status = document.getElementById('status');
    
    let frames = [];
    let videoDuration = 0;
    const fps = 24;

    videoInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        preview.src = url;
        preview.style.display = "block";
        preview.onloadedmetadata = () => {
            videoDuration = preview.duration;
            status.textContent = `✅ Video loaded — ${videoDuration.toFixed(1)} seconds`;
            startBtn.disabled = false;
        };
    };

    startBtn.onclick = async () => {
       
        startBtn.disabled = true;
        downloadBtn.disabled = true;
        frames = [];
        status.textContent = "Extracting frames... (may take a while)";
        progress.value = 0;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = preview.videoWidth || 1280;
        canvas.height = preview.videoHeight || 720;
        const frameInterval = 1 / fps;
        const totalFrames = Math.floor(videoDuration * fps) + 1;
        let currentTime = 0;
        let frameCount = 0;

        async function extractNext() {
            if (currentTime > videoDuration) {
                status.textContent = `Extracted ${frames.length} frames`;
                downloadBtn.disabled = frames.length === 0;
                startBtn.disabled = false;
                return;
            }
            preview.currentTime = currentTime;
            await new Promise(resolve => {
                preview.onseeked = () => {
                    setTimeout(() => {
                        try {
                            ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
                            canvas.toBlob(blob => {
                                if (blob) {
                                    const num = String(frameCount).padStart(5, '0');
                                    frames.push({ name: `frame_${num}.png`, data: blob });
                                    frameCount++;
                                    progress.value = (frameCount / totalFrames) * 100;
                                }
                                currentTime += frameInterval;
                                extractNext();
                            }, 'image/png');
                        } catch (err) {
                            currentTime += frameInterval;
                            extractNext();
                        }
                    }, 60);
                };
            });
        }
        extractNext();
    };
   downloadBtn.onclick = async () => {
       if (frames.length === 0) return;
   
       downloadBtn.disabled = true;
       status.textContent = "Creating ZIP...";
   
       const zip = new JSZip();
   
       for (let i = 0; i < frames.length; i++) {
           zip.file(frames[i].name, frames[i].data);
       }
   
       const content = await zip.generateAsync({ type: "blob" });
   
       const url = URL.createObjectURL(content);
       const a = document.createElement("a");
       a.href = url;
       a.download = "frames.zip";
       a.click();
   
       URL.revokeObjectURL(url);
   
       status.textContent = "ZIP downloaded ✅";
       downloadBtn.disabled = false;
   };
}

// ==================== INIT ====================
Object.keys(data).forEach(key => createTab(key));
createTab("Presets", false, false, true);
createTab("Video Extractor", true);
createTab("Message Me", false, true);

const firstTab = tabsEl.querySelector(".tab");
if (firstTab) firstTab.click();

searchInput.addEventListener('input', e => performSearch(e.target.value.trim()));

searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        if (highlights.length === 0) return;
        currentHighlightIndex = (currentHighlightIndex + 1) % highlights.length;
        scrollToHighlight();
    }
});
</script>
</body>
</html>
