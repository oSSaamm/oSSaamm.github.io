<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Skillbuilder's Help + Video Extractor</title>
<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: #eaeaea;
    font-family: Arial, Helvetica, sans-serif;
}
#container {
    display: flex;
    height: 100vh;
}
#tabs {
    width: 260px;
    background: #151515;
    overflow-y: auto;
    border-right: 2px solid #222;
    position: relative;
}
.tab {
    padding: 14px;
    cursor: pointer;
    border-bottom: 1px solid #222;
    position: relative;
    transition: background .2s, box-shadow .25s;
}
.tab:hover {
    background: #1f1f1f;
}
.tab.active {
    background: #272727;
    box-shadow:
        inset 0 0 12px rgba(255,212,0,0.25),
        0 0 10px rgba(255,212,0,0.15);
}
#indicator {
    position: absolute;
    left: 0;
    width: 4px;
    height: 0;
    background: #ffd400;
    transition:
        top .25s cubic-bezier(.4,0,.2,1),
        height .25s cubic-bezier(.4,0,.2,1);
}
#content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}
#search-bar {
    padding: 12px 20px;
    background: #151515;
    border-bottom: 1px solid #222;
    display: none; /* escondido na aba de vídeo por enquanto */
}
#search-input {
    width: 100%;
    padding: 10px 14px;
    font-size: 15px;
    background: #1f1f1f;
    color: #eaeaea;
    border: 1px solid #444;
    border-radius: 6px;
    outline: none;
}
#search-input:focus {
    border-color: #ffd400;
    box-shadow: 0 0 0 2px rgba(255,212,0,0.2);
}
#content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    line-height: 1.45;
}
.highlight {
    background-color: #ffd400;
    color: #000;
    padding: 1px 3px;
    border-radius: 3px;
}

/* === Estilos específicos do Video Extractor === */
#video-extractor {
    padding: 0 20px;
}
#video-extractor h2 {
    margin-top: 0;
    color: #ffd400;
}
#videoInput, #preview {
    display: block;
    margin: 16px 0;
}
#preview {
    max-width: 100%;
    background: #000;
    border: 1px solid #333;
}
button {
    padding: 10px 18px;
    margin: 8px 12px 8px 0;
    background: #1f1f1f;
    color: #eaeaea;
    border: 1px solid #444;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}
button:hover {
    background: #2a2a2a;
}
button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
button#startBtn, button#downloadBtn {
    background: #ffd400;
    color: #111;
    border: none;
    font-weight: bold;
}
progress {
    width: 100%;
    height: 20px;
    margin: 16px 0;
}
#status {
    min-height: 1.4em;
    color: #0f8;
}
.hidden { display: none; }
</style>
</head>
<body>
<div id="container">
    <div id="tabs">
        <div id="indicator"></div>
    </div>
    <div id="content-area">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search at actual content">
        </div>
        <div id="content">clica numa aba aí, animal</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
// ────────────────────────────────────────────────
// DADOS DAS ABAS ANTIGAS
// ────────────────────────────────────────────────
const data = {
    "ALL JJS Sounds": `Credits: oSam(site owner) and his friend ... (teu conteúdo original aqui, mantive cortado pra não ficar gigante)`,
    "Punches + Direction": `CREDITS(docs): ...`,
    "Non-punch | Extras": `...`,
    // ... coloca aqui todas as outras chaves que tu tinha
    // (não repeti tudo pra resposta não ficar gigante, mas mantém igual)
};

// ────────────────────────────────────────────────
// ELEMENTOS DO DOM
// ────────────────────────────────────────────────
const tabsEl      = document.getElementById("tabs");
const contentEl   = document.getElementById("content");
const indicator   = document.getElementById("indicator");
const searchBar   = document.getElementById("search-bar");
const searchInput = document.getElementById("search-input");

// Variáveis de busca
let currentTerm = "";
let highlights = [];
let currentHighlightIndex = -1;

// ────────────────────────────────────────────────
// FUNÇÕES DE BUSCA (só aparecem nas abas de texto)
// ────────────────────────────────────────────────
function moveIndicator(el) {
    indicator.style.top = el.offsetTop + "px";
    indicator.style.height = el.offsetHeight + "px";
}

function clearHighlights() {
    contentEl.innerHTML = contentEl.innerHTML.replace(/<span class="highlight">|<\/span>/g, '');
    highlights = [];
    currentHighlightIndex = -1;
}

function performSearch(term) {
    if (!term.trim()) { clearHighlights(); return; }
    if (term === currentTerm) { goToNextHighlight(); return; }

    currentTerm = term;
    clearHighlights();

    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escaped, 'gi');
    contentEl.innerHTML = contentEl.innerHTML.replace(regex, match => `<span class="highlight">${match}</span>`);

    highlights = Array.from(contentEl.querySelectorAll('.highlight'));
    if (highlights.length > 0) {
        currentHighlightIndex = 0;
        scrollToCurrent();
    }
}

function scrollToCurrent() {
    if (currentHighlightIndex >= 0 && currentHighlightIndex < highlights.length) {
        highlights[currentHighlightIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function goToNextHighlight() {
    if (highlights.length === 0) return;
    currentHighlightIndex = (currentHighlightIndex + 1) % highlights.length;
    scrollToCurrent();
}

// ────────────────────────────────────────────────
// CRIA AS ABAS
// ────────────────────────────────────────────────
function createTab(key, isVideoExtractor = false) {
    const div = document.createElement("div");
    div.className = "tab";
    div.textContent = key;
    div.dataset.key = key;

    div.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        div.classList.add("active");

        if (isVideoExtractor) {
            showVideoExtractor();
        } else {
            contentEl.innerHTML = `<pre>${data[key] || "Conteúdo não encontrado"}</pre>`;
            searchBar.style.display = "block";
            currentTerm = "";
            searchInput.value = "";
            clearHighlights();
        }

        moveIndicator(div);
    };

    tabsEl.appendChild(div);
    return div;
}

// ────────────────────────────────────────────────
// VIDEO EXTRACTOR (aba especial)
// ────────────────────────────────────────────────
function showVideoExtractor() {
    searchBar.style.display = "none"; // esconde busca na aba de vídeo

    contentEl.innerHTML = `
<div id="video-extractor">
    <h2>Video Extractor (24 fps → PNGs → ZIP)</h2>

    <input type="file" id="videoInput" accept="video/*">
    <video id="preview" controls muted></video>

    <div>
        <button id="startBtn">Começar extração (24 fps)</button>
        <button id="downloadBtn" disabled>Baixar tudo como ZIP</button>
    </div>

    <progress id="progress" value="0" max="100"></progress>
    <div id="status">Selecione um vídeo para começar</div>
</div>`;

    // Re-conecta os eventos do extrator
    const videoInput = document.getElementById('videoInput');
    const preview     = document.getElementById('preview');
    const startBtn    = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const progress    = document.getElementById('progress');
    const status      = document.getElementById('status');

    let frames = [];
    let videoDuration = 0;
    const fps = 24;

    videoInput.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);
        preview.src = url;
        preview.onloadedmetadata = () => {
            videoDuration = preview.duration;
            status.textContent = `Vídeo carregado — ${videoDuration.toFixed(2)} segundos`;
            startBtn.disabled = false;
        };
    };

    startBtn.onclick = async () => {
        startBtn.disabled = true;
        downloadBtn.disabled = true;
        frames = [];
        status.textContent = "Extraindo frames... (pode demorar)";
        progress.value = 0;

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = preview.videoWidth || 1280;
        canvas.height = preview.videoHeight || 720;

        const frameInterval = 1 / fps;
        const totalFrames = Math.floor(videoDuration * fps) + 1;
        let currentTime = 0;
        let frameCount = 0;

        async function extractNext() {
            if (currentTime > videoDuration) {
                status.textContent = `Extraídos ${frames.length} frames`;
                downloadBtn.disabled = frames.length === 0;
                startBtn.disabled = false;
                return;
            }

            preview.currentTime = currentTime;

            await new Promise(resolve => {
                preview.onseeked = () => {
                    setTimeout(() => {
                        try {
                            ctx.drawImage(preview, 0, 0, canvas.width, canvas.height);
                            canvas.toBlob(blob => {
                                if (blob) {
                                    const num = String(frameCount).padStart(5, '0');
                                    frames.push({ name: `frame_${num}.png`, data: blob });
                                    frameCount++;
                                    progress.value = (frameCount / totalFrames) * 100;
                                }
                                currentTime += frameInterval;
                                extractNext();
                            }, 'image/png');
                        } catch (err) {
                            currentTime += frameInterval;
                            extractNext();
                        }
                    }, 60);
                };
            });
        }

        extractNext();
    };

    downloadBtn.onclick = async () => {
        if (frames.length === 0) return;
        status.textContent = "Gerando ZIP...";

        const zip = new JSZip();
        frames.forEach(f => zip.file(f.name, f.data));

        try {
            const blob = await zip.generateAsync({type: 'blob'});
            if ('showSaveFilePicker' in window) {
                const handle = await window.showSaveFilePicker({
                    suggestedName: `frames-${new Date().toISOString().slice(0,10)}.zip`,
                    types: [{ description: 'ZIP', accept: {'application/zip': ['.zip']} }],
                });
                const writable = await handle.createWritable();
                await blob.stream().pipeTo(writable);
                status.textContent = "ZIP salvo na pasta escolhida!";
            } else {
                saveAs(blob, `frames-${frames.length}-imgs.zip`);
                status.textContent = "Download iniciado";
            }
        } catch (err) {
            status.textContent = "Erro: " + err.message;
        }
    };
}

// ────────────────────────────────────────────────
// INICIALIZAÇÃO DAS ABAS
// ────────────────────────────────────────────────
Object.keys(data).forEach(key => {
    createTab(key);
});

// Aba do Video Extractor (última)
const videoTab = createTab("Video Extractor", true);

// Abre a primeira aba por padrão
const firstTab = tabsEl.querySelector(".tab");
if (firstTab) {
    firstTab.click();
}

// Eventos de busca
searchInput.addEventListener('input', e => performSearch(e.target.value.trim()));
searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        e.preventDefault();
        performSearch(searchInput.value.trim());
    }
});
</script>
</body>
</html>
